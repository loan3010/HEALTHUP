<!-- Modal Backdrop -->
<div class="modal-backdrop" *ngIf="isOpen" (click)="close()">
  
  <!-- Modal Content -->
  <div class="track-modal" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3 class="modal-title">TRA CỨU ĐƠN HÀNG</h3>
      <button class="close-btn" (click)="close()" type="button">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body">
      <p class="modal-desc">
        Nhập <strong>số điện thoại</strong> và <strong>mã đơn</strong> (VD: ORD00000000001) đã nhận khi đặt hàng.
      </p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="track-phone">Số điện thoại <span class="required">*</span></label>
          <input
            type="tel"
            id="track-phone"
            class="form-input"
            [(ngModel)]="phoneNumber"
            name="phone"
            placeholder="0xxxxxxxxx"
            maxlength="10"
            inputmode="numeric"
            autocomplete="tel"
          />
        </div>

        <div class="form-group">
          <label for="track-code">Mã đơn hàng <span class="required">*</span></label>
          <input
            type="text"
            id="track-code"
            class="form-input"
            [(ngModel)]="orderCode"
            name="orderCode"
            placeholder="ORD00000000001"
            maxlength="14"
            autocapitalize="characters"
            autocomplete="off"
          />
        </div>

        <button type="submit" class="submit-btn">
          <i class="bi bi-search"></i>
          Tra cứu đơn hàng
        </button>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>
      </form>
    </div>

  </div>

</div>
