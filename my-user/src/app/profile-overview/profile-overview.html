<h3 class="mb-4">Tài khoản cá nhân</h3>

<div class="card shadow-lg p-4 profile-card">

  <div class="text-center mb-4">
    <div class="avatar-lg mx-auto">{{ getInitials() }}</div>
    <h5 class="mt-3">{{ user.username }}</h5>
    <small class="text-muted">{{ user.email || user.phone }}</small>
  </div>

  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label>Họ tên</label>
      <input type="text" class="form-control" formControlName="username" placeholder="Nhập họ tên">
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Ngày sinh</label>
        <input type="date" class="form-control" formControlName="dob">
      </div>

      <div class="col-md-6 mb-3">
        <label>Giới tính</label>
        <div class="d-flex gap-3 mt-2">
          <div><input type="radio" name="gender" value="male" formControlName="gender"> Nam</div>
          <div><input type="radio" name="gender" value="female" formControlName="gender"> Nữ</div>
          <div><input type="radio" name="gender" value="other" formControlName="gender"> Khác</div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Số điện thoại</label>
        <input type="tel" class="form-control" formControlName="phone" placeholder="Nhập số điện thoại">
      </div>

      <div class="col-md-6 mb-3">
        <label>Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="Nhập email">
      </div>
    </div>

    <div class="mb-3">
      <label>Địa chỉ</label>
      <input type="text" class="form-control" formControlName="address" placeholder="Nhập địa chỉ">
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-secondary px-4" [disabled]="isLoading">
        {{ isLoading ? 'Đang lưu...' : 'Lưu những thay đổi' }}
      </button>
    </div>

    <div class="text-center mt-3" *ngIf="message">
      <small [class.text-success]="!error" [class.text-danger]="error">{{ message }}</small>
    </div>
  </form>

</div>
