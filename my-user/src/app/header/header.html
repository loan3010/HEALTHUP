<header class="main-header">
  <div class="header-container">

    <!-- Logo -->
    <a class="logo" routerLink="/">
      <img src="/assets/images/logo1.png" alt="Logo">
    </a>

    <!-- Nav links (desktop) -->
    <nav class="nav-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Trang chủ</a>
      <a routerLink="/about-the-brand" routerLinkActive="active">Giới thiệu</a>
      <a routerLink="/products" routerLinkActive="active">Sản phẩm</a>
      <a routerLink="/blog" routerLinkActive="active">Blogs</a>
      <a routerLink="/faqs" routerLinkActive="active">FAQs</a>
    </nav>

    <!-- Right: search + actions + hamburger -->
    <div class="header-right">

      <!-- Search -->
      <div class="search-box">
        <input type="text" placeholder="Tìm sản phẩm..." />
        <i class="bi bi-search"></i>
      </div>

      <!-- Actions -->
      <div class="header-actions">
        <!-- Chưa đăng nhập -->
        <ng-container *ngIf="!isLoggedIn">
          <button type="button" class="btn-track-order" (click)="openTrackOrder()" title="Tra cứu đơn hàng">
            <i class="bi bi-search btn-icon-only"></i>
            <span class="btn-text">Tra cứu đơn hàng</span>
          </button>
          <button type="button" class="btn-login" routerLink="/login" title="Đăng nhập">
            <i class="bi bi-box-arrow-in-right btn-icon-only"></i>
            <span class="btn-text">Đăng nhập</span>
          </button>
          <button type="button" class="btn-register" routerLink="/register" title="Đăng ký">
            <i class="bi bi-person-plus btn-icon-only"></i>
            <span class="btn-text">Đăng ký</span>
          </button>
        </ng-container>

        <!-- Đã đăng nhập -->
        <ng-container *ngIf="isLoggedIn">
          <i class="bi bi-bell icon" title="Thông báo"></i>
          <i class="bi bi-cart icon" routerLink="/cart" title="Giỏ hàng"></i>
          
          <div class="user-menu">
            <div class="user-greeting" (click)="toggleDropdown()">
              <div class="user-avatar">{{ getInitials() }}</div>
              <span class="user-name">Xin chào, {{ userName }}</span>
              <i class="bi bi-chevron-down dropdown-icon"></i>
            </div>
            
            <div class="user-dropdown" *ngIf="showDropdown">
              <!-- <a routerLink="/profile" (click)="closeDropdown()">
                <i class="bi bi-person"></i> Tài khoản của tôi
              </a>
              <a routerLink="/orders" (click)="closeDropdown()">
                <i class="bi bi-box-seam"></i> Đơn hàng
              </a>
              <a routerLink="/wishlist" (click)="closeDropdown()">
                <i class="bi bi-heart"></i> Yêu thích
              </a>
              <a routerLink="/settings" (click)="closeDropdown()">
                <i class="bi bi-gear"></i> Cài đặt
              </a>
              <a routerLink="/settings" (click)="closeDropdown()">
                <i class="bi bi-gear"></i> Sổ địa chỉ
              </a>
              <div class="dropdown-divider"></div>
              <a (click)="logout()" class="logout-link">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
              </a> -->
              <a routerLink="/profile/overview" (click)="closeDropdown()">
                <i class="bi bi-person"></i> Tài khoản của tôi
              </a>
              <a routerLink="/orders" (click)="closeDropdown()">
                <i class="bi bi-box-seam"></i> Đơn hàng
              </a>
              <a routerLink="/profile/wishlist" (click)="closeDropdown()">
                <i class="bi bi-heart"></i> Yêu thích
              </a>
              <a routerLink="/profile/address" (click)="closeDropdown()">
                <i class="bi bi-geo-alt"></i> Sổ địa chỉ
              </a>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Hamburger (mobile only) -->
      <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </div>

  <!-- Mobile nav dropdown -->
  <div class="mobile-nav-menu" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Trang chủ</a>
    <a routerLink="/about-the-brand" routerLinkActive="active" (click)="closeMenu()">Giới thiệu</a>
    <a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Sản phẩm</a>
    <a routerLink="/blog" routerLinkActive="active" (click)="closeMenu()">Blogs</a>
    <a routerLink="/faqs" routerLinkActive="active" (click)="closeMenu()">FAQs</a>
  </div>
</header>

<!-- Track Order Modal -->
<app-track-order-modal 
  [isOpen]="showTrackOrderModal" 
  (closeModal)="closeTrackOrderModal()">
</app-track-order-modal>
