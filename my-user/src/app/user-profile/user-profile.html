<div class="user-wrapper">

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Avatar block -->
    <div class="sidebar-avatar-block">
      <div class="avatar">{{ getInitials() }}</div>
      <p class="sidebar-username">{{ userName }}</p>
      <span class="sidebar-rank-badge"
            [class.badge-member]="memberRank === 'member'"
            [class.badge-vip]="memberRank === 'vip'">
        <i class="bi"
           [class.bi-person-fill]="memberRank === 'member'"
           [class.bi-star-fill]="memberRank === 'vip'"></i>
        {{ memberRankLabel }}
      </span>
    </div>

    <!-- Menu -->
    <ul class="menu list-unstyled">
      <li routerLink="/profile/overview"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
        <i class="bi bi-person"></i> Tài khoản cá nhân
      </li>
      <li routerLink="/profile/wishlist" routerLinkActive="active">
        <i class="bi bi-heart"></i> Sản phẩm yêu thích
      </li>
      <li routerLink="/profile/address" routerLinkActive="active">
        <i class="bi bi-geo-alt"></i> Sổ địa chỉ
      </li>

      <div class="menu-divider"></div>

      <li routerLink="/profile/order-management" routerLinkActive="active">
        <i class="bi bi-bag-check"></i> Theo dõi đơn hàng
      </li>
      <li routerLink="/profile/return-management" routerLinkActive="active">
        <i class="bi bi-arrow-repeat"></i> Quản lý đổi trả
      </li>
      <li routerLink="/profile/order-review" routerLinkActive="active">
        <i class="bi bi-star"></i> Đánh giá đơn hàng
      </li>

      <div class="menu-divider"></div>

      <li routerLink="/profile/notifications" routerLinkActive="active">
        <i class="bi bi-bell"></i> Thông báo
      </li>
    </ul>

    <!-- Logout -->
    <div class="sidebar-logout">
      <button class="btn-logout" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Đăng xuất
      </button>
    </div>

  </div>

  <!-- Content -->
  <div class="content">
    <router-outlet></router-outlet>
  </div>

</div>
