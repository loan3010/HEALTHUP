<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="box">

    <!-- LOGO + TITLE -->
    <div class="title-wrap">
      <div class="title-logo">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4-4-1.79-4-4z"/>
          <path d="M12 6v2M12 16v2M6 12H4M20 12h-2"/>
        </svg>
      </div>
      <h2 class="title">Chào mừng trở lại</h2>
      <p class="title-sub">Đăng nhập để tiếp tục hành trình sức khoẻ</p>
    </div>

    <!-- autocomplete="off" + fake inputs chống autofill (từ nhánh kia) -->
    <form (ngSubmit)="onLogin()" autocomplete="off">
      <input type="text" style="display:none">
      <input type="password" style="display:none">

      <!-- Tài khoản bị khóa: hiện lý do admin đã nhập -->
      <div *ngIf="loginBanMessage" class="login-ban-banner" role="alert">
        <div class="login-ban-title"><i class="bi bi-exclamation-octagon-fill"></i> {{ loginBanMessage }}</div>
        <div *ngIf="loginBanReason" class="login-ban-reason-label">Lý do từ cửa hàng:</div>
        <div *ngIf="loginBanReason" class="login-ban-reason-text">{{ loginBanReason }}</div>
      </div>

      <!-- USERNAME / EMAIL / PHONE -->
      <div class="field">
        <label class="label">
          Tên tài khoản <span class="req">*</span>
        </label>
        <div class="control">
          <span class="inp-icon">
            <i class="bi bi-person"></i>
          </span>
          <input
            type="text"
            class="inp"
            placeholder="Email hoặc số điện thoại"
            name="emailOrPhone"
            [(ngModel)]="emailOrPhone"
            autocomplete="off"
            required
          />
          <button type="button" class="clear" (click)="emailOrPhone=''">×</button>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label class="label">
          Mật khẩu <span class="req">*</span>
        </label>
        <div class="control">
          <span class="inp-icon">
            <i class="bi bi-lock"></i>
          </span>
          <input
            type="password"
            class="inp has-two"
            placeholder="Tối thiểu 6 ký tự"
            name="password"
            [(ngModel)]="password"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <button type="button" class="clear" (click)="password=''">×</button>
        </div>
      </div>

      <!-- FORGOT -->
      <div class="row">
        <a routerLink="/forgotpw" class="link">Quên mật khẩu?</a>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="submit" [disabled]="isLoading">
        {{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>

      <!-- DIVIDER -->
      <div class="divider">hoặc tiếp tục với</div>

      <!-- SOCIAL -->
      <div class="social">
        <button type="button" class="social-btn">
          <span class="ico ico-g">G</span> Google
        </button>
        <button type="button" class="social-btn">
          <span class="ico ico-f">f</span> Facebook
        </button>
      </div>

      <!-- BOTTOM -->
      <div class="bottom">
        <span>Chưa có tài khoản?</span>
        <a routerLink="/register">Đăng ký ngay</a>
      </div>

    </form>
  </div>
</div>
