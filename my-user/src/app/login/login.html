<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="box">
    <h2 class="title">ĐĂNG NHẬP</h2>

    <form (ngSubmit)="onLogin()" autocomplete="off">

      <!-- fake inputs chống autofill -->
      <input type="text" style="display:none">
      <input type="password" style="display:none">

      <!-- USERNAME -->
      <div class="field">
        <div class="label">
          Tên tài khoản <span class="req">*</span>
        </div>

        <div class="control">
          <input
            type="text"
            class="inp"
            placeholder="Nhập email hoặc số điện thoại"
            name="emailOrPhone"
            [(ngModel)]="emailOrPhone"
            autocomplete="off"
            required
          />

          <button type="button" class="clear" (click)="emailOrPhone=''">
            ×
          </button>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <div class="label">
          Mật khẩu <span class="req">*</span>
        </div>

        <div class="control">
          <input
            type="password"
            class="inp has-two"
            placeholder="Mật khẩu tối thiểu 6 ký tự"
            name="password"
            [(ngModel)]="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <button type="button" class="clear" (click)="password=''">
            ×
          </button>
        </div>
      </div>

      <div class="row">
        <a routerLink="/forgotpw" class="link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="submit" [disabled]="isLoading">
        {{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>

      <div class="divider">hoặc đăng nhập bằng</div>

      <div class="social">
        <button type="button" class="social-btn">
          <span class="ico">G</span> Google
        </button>

        <button type="button" class="social-btn">
          <span class="ico">f</span> Facebook
        </button>
      </div>

      <div class="bottom">
        <span>Bạn chưa có tài khoản?</span>
        <a routerLink="/register">Đăng ký ngay</a>
      </div>

    </form>
  </div>
</div>
