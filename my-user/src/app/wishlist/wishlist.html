<h4 class="fw-bold mb-2">Sản phẩm yêu thích</h4>
<p class="text-muted mb-4">Quản lý các sản phẩm bạn đã yêu thích</p>

<!-- FILTER -->
<div class="filter-bar p-3 mb-3">
  <button class="btn btn-light btn-sm me-2" [class.active]="sortBy === 'newest'" (click)="sortBy = 'newest'">
    Mới nhất
  </button>
  <button class="btn btn-light btn-sm me-2" [class.active]="sortBy === 'price-asc'" (click)="sortBy = 'price-asc'">
    Giá thấp đến cao
  </button>
  <button class="btn btn-light btn-sm" [class.active]="sortBy === 'price-desc'" (click)="sortBy = 'price-desc'">
    Giá cao đến thấp
  </button>
</div>

<!-- PRODUCT LIST -->
<div class="product-card d-flex align-items-center p-3 mb-3" *ngFor="let product of wishlistItems">
  <i class="bi bi-heart-fill text-danger me-3 fs-5" (click)="removeFromWishlist(product.id)"></i>

  <div class="product-img me-3" [style.background-image]="'url(' + (product.image || '') + ')'"></div>

  <div class="flex-grow-1">
    <h6 class="mb-1">{{ product.name }}</h6>
    <small class="text-muted">{{ product.unit }}</small>
  </div>

  <div class="price fw-bold me-4">{{ product.price | number }} ₫</div>

  <button class="btn btn-outline-dark" (click)="addToCart(product)">
    <i class="bi bi-cart"></i>
  </button>
</div>

<div class="text-center py-5" *ngIf="wishlistItems.length === 0">
  <i class="bi bi-heart" style="font-size: 48px; color: #ccc;"></i>
  <p class="text-muted mt-3">Chưa có sản phẩm yêu thích nào</p>
</div>
