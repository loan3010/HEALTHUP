<!-- TOAST -->
<div class="wl-toast" [class.show]="toastVisible">
  <i class="bi bi-check-circle-fill"></i> {{ toastMessage }}
</div>

<div class="wl-header">
  <div>
    <h4>Sản phẩm yêu thích</h4>
    <p>{{ wishlistItems.length }} sản phẩm đã lưu</p>
  </div>
  <div class="wl-sort">
    <button [class.active]="sortBy === 'newest'"    (click)="sortBy = 'newest'">Mới nhất</button>
    <button [class.active]="sortBy === 'price-asc'" (click)="sortBy = 'price-asc'">Giá ↑</button>
    <button [class.active]="sortBy === 'price-desc'"(click)="sortBy = 'price-desc'">Giá ↓</button>
  </div>
</div>

<!-- LOADING -->
<div class="wl-loading" *ngIf="isLoading">
  <div class="wl-skeleton" *ngFor="let s of [1,2,3]"></div>
</div>

<!-- GRID -->
<div class="wl-grid" *ngIf="!isLoading && sortedItems.length > 0">
  <div class="wl-card" *ngFor="let p of sortedItems">

    <!-- Image -->
    <div class="wl-card-img" (click)="goToProduct(p._id)">
      <img [src]="getImage(p)" [alt]="p.name"
        onerror="this.src='/assets/images/placeholder.png'" />
      <span class="wl-badge wl-badge-new" *ngIf="p.badge === 'new'">Mới</span>
      <span class="wl-badge wl-badge-hot" *ngIf="p.badge === 'hot'">Hot</span>
    </div>

    <!-- Info -->
    <div class="wl-card-body">
      <p class="wl-cat">{{ p.cat }}</p>
      <p class="wl-name" (click)="goToProduct(p._id)">{{ p.name }}</p>
      <div class="wl-price-row">
        <span class="wl-price">{{ formatPrice(p.price) }}</span>
        <span class="wl-old-price" *ngIf="p.oldPrice">{{ formatPrice(p.oldPrice) }}</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="wl-card-actions">
      <button class="wl-btn-cart" (click)="addToCart(p)">
        <i class="bi bi-cart-plus"></i> Thêm vào giỏ
      </button>
      <button class="wl-btn-remove" (click)="removeFromWishlist(p._id)" title="Xóa">
        <i class="bi bi-trash3"></i>
      </button>
    </div>

  </div>
</div>

<!-- EMPTY -->
<div class="wl-empty" *ngIf="!isLoading && sortedItems.length === 0">
  <div class="wl-empty-icon">
    <i class="bi bi-heart"></i>
  </div>
  <h5>Chưa có sản phẩm yêu thích</h5>
  <p>Khám phá và lưu những sản phẩm bạn yêu thích nhé!</p>
  <a routerLink="/products" class="wl-btn-explore">
    <i class="bi bi-grid"></i> Khám phá sản phẩm
  </a>
</div>
