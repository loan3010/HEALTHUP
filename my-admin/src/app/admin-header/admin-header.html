<header class="admin-header">
  <div class="header-left">
    <button class="menu-toggle-btn" (click)="onToggleClick()">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <div class="header-actions">
    <div class="notification-icon">
      <i class="bi bi-bell"></i>
      <span class="badge-dot"></span>
    </div>

    <div class="user-profile-wrapper">
      <div class="user-profile" (click)="toggleMenu($event)">
        <i class="bi bi-person-circle"></i>
        <span>{{ adminName }}</span>
        <i class="bi bi-chevron-down ms-1" style="font-size: 0.8rem;"></i>
      </div>

      <div class="admin-dropdown" *ngIf="showDropdown">
        <div class="dropdown-header">
          <div class="avatar-large">
            <i class="bi bi-person-badge-fill"></i>
          </div>
          <div class="admin-info">
            <div class="full-name">{{ adminFullName }}</div>
            <div class="admin-code">Mã: <span>{{ adminID }}</span></div>
          </div>
        </div>
        
        <div class="dropdown-divider"></div>

        <button class="logout-btn" (click)="onLogout()">
          <i class="bi bi-box-arrow-right"></i>
          Đăng xuất hệ thống
        </button>
      </div>
    </div>
  </div>
</header>
