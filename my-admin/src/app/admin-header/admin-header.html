<header class="admin-header">
  <div class="header-left">
    <button type="button" class="menu-toggle-btn" (click)="onToggleClick()">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <div class="header-actions">
    <!-- Chuông thông báo + dropdown -->
    <div class="notification-wrap" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="notification-icon"
        (click)="toggleNotifPanel($event)"
        title="Thông báo"
        aria-label="Mở thông báo"
      >
        <i class="bi bi-bell"></i>
        <span class="notif-badge-count" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
      </button>

      <div class="notif-dropdown" *ngIf="notifOpen">
        <div class="notif-dropdown-head">
          <span class="notif-title">Thông báo</span>
          <button type="button" class="notif-mark-all" (click)="markAllNotificationsRead($event)">
            Đọc hết
          </button>
        </div>
        <div class="notif-list" *ngIf="notifications.length; else notifEmpty">
          <button
            type="button"
            class="notif-item"
            *ngFor="let n of notifications; trackBy: trackNoti"
            [class.unread]="!n.isRead"
            (click)="onNotificationClick($event, n)"
          >
            <span class="notif-item-title">{{ n.title }}</span>
            <span class="notif-item-msg">{{ n.message }}</span>
            <span class="notif-item-time">{{ n.createdAt | date: 'dd/MM HH:mm' }}</span>
          </button>
        </div>
        <ng-template #notifEmpty>
          <div class="notif-empty">Không có thông báo trong 7 ngày.</div>
        </ng-template>
      </div>
    </div>

    <div class="user-profile-wrapper">
      <div class="user-profile" (click)="toggleMenu($event)">
        <i class="bi bi-person-circle"></i>
        <span>{{ adminName }}</span>
        <i class="bi bi-chevron-down ms-1" style="font-size: 0.8rem;"></i>
      </div>

      <div class="admin-dropdown" *ngIf="showDropdown">
        <div class="dropdown-header">
          <div class="avatar-large">
            <i class="bi bi-person-badge-fill"></i>
          </div>
          <div class="admin-info">
            <div class="full-name">{{ adminFullName }}</div>
            <div class="admin-code">Mã: <span>{{ adminID }}</span></div>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <button type="button" class="logout-btn" (click)="onLogout()">
          <i class="bi bi-box-arrow-right"></i>
          Đăng xuất hệ thống
        </button>
      </div>
    </div>
  </div>
</header>
