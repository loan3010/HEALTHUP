<div class="breadcrumb">
    <span>Quản trị viên</span>
    <span class="separator">/</span>
    <span>Quản lý khuyến mãi</span>
    <span class="separator">/</span>
    <span class="active">Danh sách khuyến mãi</span>
  </div>

<app-promotion-list #listComp (goEdit)="handleGoEdit($event)" (goAdd)="handleGoAdd()">
</app-promotion-list>

<div class="modal-overlay" *ngIf="isModalOpen">
  <app-promotion-form 
    [mode]="formMode" 
    [promoData]="selectedPromotion" 
    (goBack)="closeModal()"
    (saved)="listComp.taiDuLieu()"> 
  </app-promotion-form>
</div>
