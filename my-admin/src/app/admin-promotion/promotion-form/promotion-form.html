<div class="modal-container shadow-lg">
  <div class="modal-header">
    <h2 class="modal-title">{{ mode === 'add' ? 'Thêm mới' : 'Chỉnh sửa' }} khuyến mãi</h2>
    <button class="btn-close-x" (click)="goBack.emit()">&times;</button>
  </div>

  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group">
        <label>Mã khuyến mãi <span class="required">*</span></label>
        <input type="text" [(ngModel)]="formData.code" placeholder="VD: NHAPMOI20">
      </div>
      <div class="form-group">
        <label>Tên khuyến mãi <span class="required">*</span></label>
        <input type="text" [(ngModel)]="formData.name" placeholder="VD: Giảm 20k cho đơn đầu tiên">
      </div>

      <div class="form-group full-width">
        <label>Mô tả (Không bắt buộc)</label>
        <textarea rows="2" [(ngModel)]="formData.description" placeholder="Mô tả chi tiết chương trình..."></textarea>
      </div>

      <div class="form-group">
        <label>Loại khuyến mãi <span class="required">*</span></label>
        <select [(ngModel)]="formData.type">
          <option value="order">Tiền hàng</option>
          <option value="shipping">Phí vận chuyển</option>
        </select>
      </div>
      <div class="form-group">
        <label>Trạng thái <span class="required">*</span></label>
        <select [(ngModel)]="formData.status">
          <option value="upcoming">Sắp diễn ra</option>
          <option value="ongoing">Đang diễn ra</option>
          <option value="expired">Đã kết thúc</option>
        </select>
      </div>

      <div class="form-group">
        <label>Loại giảm giá <span class="required">*</span></label>
        <select [(ngModel)]="formData.discountType" (change)="onDiscountTypeChange()">
          <option value="percent">Phần trăm (%)</option>
          <option value="fixed">Số tiền cố định (đ)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Giá trị giảm <span class="required">*</span></label>
        <div class="input-with-suffix">
          <input type="number"
                 [(ngModel)]="formData.discountValue"
                 [min]="0"
                 [max]="formData.discountType === 'percent' ? 100 : null"
                 placeholder="0">
          <span class="suffix">{{ formData.discountType === 'percent' ? '%' : 'đ' }}</span>
        </div>
      </div>

      <div class="form-group">
        <label>Giá trị đơn hàng tối thiểu (đ)</label>
        <input type="number" [(ngModel)]="formData.minOrder" placeholder="0">
      </div>

      <div class="form-group">
        <label>Giảm tối đa (đ)</label>
        <input type="number" [(ngModel)]="formData.maxDiscount"
               [disabled]="formData.discountType === 'fixed'"
               [placeholder]="formData.discountType === 'fixed' ? 'Không áp dụng' : '0'">
      </div>

      <div class="form-group">
        <label>Ngày bắt đầu <span class="required">*</span></label>
        <div class="date-input-wrapper">
          <input type="date" [(ngModel)]="formData.startDate">
        </div>
      </div>
      <div class="form-group">
        <label>Ngày kết thúc <span class="required">*</span></label>
        <div class="date-input-wrapper">
          <input type="date" [(ngModel)]="formData.endDate">
        </div>
      </div>

      <div class="form-group">
        <label>Tổng giới hạn sử dụng <span class="required">*</span></label>
        <input type="number" [(ngModel)]="formData.totalLimit">
      </div>
      <div class="form-group">
        <label>Giới hạn mỗi khách hàng <span class="required">*</span></label>
        <input type="number" [(ngModel)]="formData.userLimit">
      </div>
    </div>

    <div class="checkbox-group mt-3">
      <input type="checkbox" id="firstOrder" [(ngModel)]="formData.firstOrderOnly">
      <label for="firstOrder">Chỉ áp dụng cho đơn hàng đầu tiên</label>
    </div>

    <!-- ── MỚI: Hạng thành viên được áp dụng ── -->
    <div class="form-group full-width mt-3">
      <label>Hạng thành viên được áp dụng</label>
      <p class="form-hint">Để trống = tất cả mọi khách đều dùng được</p>
      <div class="rank-checkbox-group">
        <label class="rank-option">
          <input type="checkbox"
                 [checked]="formData.allowedMemberRanks?.includes('member')"
                 (change)="toggleRank('member')">
          <span class="rank-badge rank-member">Thành viên</span>
        </label>
        <label class="rank-option">
          <input type="checkbox"
                 [checked]="formData.allowedMemberRanks?.includes('vip')"
                 (change)="toggleRank('vip')">
          <span class="rank-badge rank-vip">⭐ VIP</span>
        </label>
      </div>
    </div>

    <hr class="form-divider" />

    <div class="form-group full-width">
      <label>Phạm vi áp dụng <span class="required">*</span></label>
      <select [(ngModel)]="formData.applyScope" class="form-select">
        <option value="all">Toàn bộ cửa hàng</option>
        <option value="category">Danh mục sản phẩm</option>
        <option value="product">Sản phẩm cụ thể</option>
      </select>
    </div>

    <div class="selection-container mt-2" *ngIf="formData.applyScope === 'category'">
      <label class="sub-label">Chọn các danh mục áp dụng:</label>
      <div class="scroll-list shadow-sm">
        <div *ngFor="let cat of categories" class="item-check">
          <input type="checkbox"
                 [id]="'cat-' + cat._id"
                 [checked]="isSelected(cat._id, 'category')"
                 (change)="toggleSelection(cat._id, 'category')">
          <label [for]="'cat-' + cat._id">{{ cat.name }}</label>
        </div>
      </div>
    </div>

    <div class="selection-container mt-2" *ngIf="formData.applyScope === 'product'">
      <label class="sub-label">Chọn sản phẩm theo từng danh mục:</label>
      <div class="product-selection-grid">
        <div class="category-sidebar">
          <div *ngFor="let cat of categories"
               class="cat-item"
               [class.active]="selectedCatNameForProd === cat.name"
               (click)="chonDanhMucDeLoc(cat.name)">
            {{ cat.name }}
          </div>
        </div>
        <div class="scroll-list product-list shadow-sm">
          <div *ngIf="filteredProductsByCat.length === 0" class="no-data p-3">
            Không có sản phẩm nào trong danh mục này.
          </div>
          <div *ngFor="let prod of filteredProductsByCat" class="item-check">
            <input type="checkbox"
                   [id]="'prod-' + prod._id"
                   [checked]="isSelected(prod._id, 'product')"
                   (change)="toggleSelection(prod._id, 'product')">
            <label [for]="'prod-' + prod._id">
              {{ prod.name }}
              <span class="text-danger ms-1" *ngIf="prod.price">({{ prod.price | number }}đ)</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="alert-error" *ngIf="errorMessage">
      <i class="bi bi-exclamation-circle-fill"></i> {{ errorMessage }}
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-huy" (click)="goBack.emit()">HỦY</button>
    <button class="btn-luu" (click)="onSave()">LƯU THAY ĐỔI</button>
  </div>
</div>
