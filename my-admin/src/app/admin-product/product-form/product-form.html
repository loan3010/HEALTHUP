<div class="modal-container shadow-lg">
  <div class="modal-header">
    <h2 class="modal-title">{{ isEditMode ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới' }}</h2>
    <button class="btn-close-x" (click)="cancel.emit()">&times;</button>
  </div>

  <div class="modal-body">
    <div class="form-grid">
      <!-- SKU (read-only) -->
      <div class="form-group full-width">
        <label>SKU</label>
        <input type="text" [(ngModel)]="formData.sku" disabled placeholder="SKU sẽ được tự sinh khi tạo sản phẩm">
      </div>

      <!-- Tên sản phẩm -->
      <div class="form-group full-width">
        <label>Tên sản phẩm <span class="required">*</span></label>
        <input type="text" [(ngModel)]="formData.name" placeholder="Nhập tên sản phẩm...">
      </div>

      <!-- Danh mục -->
      <div class="form-group">
        <label>Danh mục <span class="required">*</span></label>
        <select [(ngModel)]="formData.cat" (ngModelChange)="onCategorySelectionChange()">
          <option value="">-- Chọn danh mục --</option>
          <option *ngFor="let c of categoryOptions" [value]="c">{{ c }}</option>
          <option value="__new__">+ Thêm danh mục mới</option>
        </select>
        <div class="inline-row" *ngIf="showNewCategoryInput">
          <input
            type="text"
            [(ngModel)]="newCategory"
            placeholder="Nhập tên danh mục mới..."
            (keydown.enter)="addNewCategory(); $event.preventDefault()"
          >
          <button type="button" class="btn-inline-add" (click)="addNewCategory()">Thêm</button>
          <button type="button" class="btn-inline-cancel" (click)="cancelNewCategory()">Hủy</button>
        </div>
      </div>

      <!-- Trạng thái -->
      <div class="form-group">
        <label>Trạng thái <span class="required">*</span></label>
        <select [(ngModel)]="formData.status">
          <option value="active">Còn hàng</option>
          <option value="outofstock">Hết hàng</option>
          <option value="suspended">Tạm ngưng bán</option>
        </select>
      </div>

      <!-- Giá bán -->
      <div class="form-group">
        <label>Giá bán <span class="required">*</span></label>
        <input type="number" [(ngModel)]="formData.price" placeholder="0" [disabled]="variants.length > 0">
      </div>

      <!-- Giá cũ -->
      <div class="form-group">
        <label>Giá cũ</label>
        <input type="number" [(ngModel)]="formData.oldPrice" placeholder="0" [disabled]="variants.length > 0">
      </div>

      <!-- Tồn kho -->
      <div class="form-group">
        <label>Tồn kho <span class="required">*</span></label>
        <input type="number" [(ngModel)]="formData.stock" placeholder="0" [disabled]="variants.length > 0">
      </div>

      <!-- Khối lượng -->
      <div class="form-group">
        <label>Khối lượng</label>
        <input type="text" [(ngModel)]="formData.weight" placeholder="VD: 200g, 1kg...">
      </div>

      <!-- Badge -->
      <div class="form-group">
        <label>Badge</label>
        <select [(ngModel)]="formData.badge">
          <option [ngValue]="null">Không có</option>
          <option value="new">New</option>
          <option value="hot">Hot</option>
        </select>
      </div>

      <!-- Đơn vị đóng gói -->
      <div class="form-group full-width">
        <div class="variant-header">
          <label>Phân loại (giá + tồn kho riêng)</label>
          <button type="button" class="btn-inline-add" (click)="addVariant()">+ Thêm phân loại</button>
        </div>
        <div class="variant-empty" *ngIf="variants.length === 0">
          Chưa có phân loại. Hệ thống sẽ dùng giá và tồn kho chung ở trên.
        </div>
        <div class="variant-grid" *ngFor="let v of variants; let i = index">
          <input type="text" [(ngModel)]="v.label" placeholder="Tên phân loại, ví dụ: 300g">
          <input type="number" [(ngModel)]="v.price" placeholder="Giá">
          <input type="number" [(ngModel)]="v.oldPrice" placeholder="Giá cũ (optional)">
          <input type="number" [(ngModel)]="v.stock" placeholder="Tồn kho">
          <button type="button" class="btn-inline-cancel" (click)="removeVariant(i)">Xóa</button>
        </div>
      </div>

      <!-- Loại đóng gói (mô tả) -->
      <div class="form-group full-width">
        <label>Loại đóng gói (khác phân loại)</label>
        <div class="inline-row">
          <input
            type="text"
            [(ngModel)]="packagingInput"
            placeholder="VD: Túi zip, Hộp giấy, Chai..."
            (keydown)="onPackagingInputKeyDown($event)"
          >
          <button type="button" class="btn-inline-add" (click)="addPackagingType()">Thêm</button>
        </div>
        <div class="chip-wrap" *ngIf="(formData.packagingTypes || []).length > 0">
          <span class="chip" *ngFor="let item of formData.packagingTypes; let i = index">
            {{ item }}
            <button type="button" class="chip-remove" (click)="removePackagingType(i)" aria-label="Xóa">×</button>
          </span>
        </div>
      </div>

      <!-- Dinh dưỡng -->
      <div class="form-group full-width">
        <div class="variant-header">
          <label>Dinh dưỡng (name / value / percent)</label>
          <button type="button" class="btn-inline-add" (click)="addNutrition()">+ Thêm dòng</button>
        </div>
        <div class="variant-empty" *ngIf="nutritions.length === 0">
          Chưa có dữ liệu dinh dưỡng.
        </div>
        <div class="nutrition-grid" *ngFor="let n of nutritions; let i = index">
          <input type="text" [(ngModel)]="n.name" placeholder="Tên thành phần, ví dụ: Năng lượng">
          <input type="text" [(ngModel)]="n.value" placeholder="Hàm lượng, ví dụ: 120 kcal">
          <input type="number" [(ngModel)]="n.percent" placeholder="% NDH">
          <button type="button" class="btn-inline-cancel" (click)="removeNutrition(i)">Xóa</button>
        </div>
      </div>
      <!-- Hình ảnh -->
<div class="form-group full-width">
  <label>Hình ảnh sản phẩm</label>
  <div class="image-upload-area">
    <!-- Ảnh đã upload -->
    <div class="image-preview-list">
      <div class="image-preview-item" *ngFor="let img of imagePreview; let i = index">
        <img [src]="img" alt="preview" />
        <button type="button" class="remove-img-btn" (click)="removeImage(i)">×</button>
      </div>
      <!-- Nút thêm ảnh -->
      <label class="image-upload-btn">
        <input type="file" accept="image/*" (change)="onImageSelect($event)" hidden />
        <i class="bi bi-plus-lg"></i>
        <span>Thêm ảnh</span>
      </label>
    </div>
  </div>
</div>

      <!-- Mô tả ngắn -->
      <div class="form-group full-width">
        <label>Mô tả ngắn</label>
        <textarea rows="2" [(ngModel)]="formData.shortDesc" placeholder="Mô tả ngắn về sản phẩm..."></textarea>
      </div>

      <!-- Mô tả đầy đủ -->
      <div class="form-group full-width">
        <label>Mô tả đầy đủ</label>
        <textarea rows="4" [(ngModel)]="formData.description" placeholder="Mô tả chi tiết sản phẩm..."></textarea>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-huy" (click)="cancel.emit()">HỦY</button>
    <button class="btn-luu" (click)="onSave()" [disabled]="isSaving">
      {{ isSaving ? 'Đang lưu...' : (isEditMode ? 'LƯU THAY ĐỔI' : 'THÊM MỚI') }}
    </button>
  </div>
</div>
