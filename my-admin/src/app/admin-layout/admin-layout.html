<div class="layout-wrapper">
  
  <app-admin-header (toggleSidebarEvent)="toggleSidebar()"></app-admin-header>

  <div class="main-body">
    
    <app-admin-sidebar
      #sideNav
      [isOpen]="isSidebarOpen"
      (tabChange)="onTabChange($event)">
    </app-admin-sidebar>

    <main class="content-area">
      <div #contentContainer></div>
    </main>

  </div>

  <!-- Thay toàn bộ alert() trình duyệt bằng modal (service: AdminAlertModalService). -->
  <app-admin-alert-modal />
</div>
