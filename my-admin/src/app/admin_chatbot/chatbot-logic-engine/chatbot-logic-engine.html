<div class="logic-engine-container fadeIn">
  
  <div class="engine-header-actions mb-3" style="display: flex; justify-content: flex-end;">
    <button class="btn-save-logic-final shadow" (click)="saveSettings()" [disabled]="isLoading">
      <i class="bi bi-cloud-check-fill me-2"></i>
      <span *ngIf="!isLoading">LƯU BẢNG CHUẨN HÓA</span>
      <span *ngIf="isLoading">ĐANG LƯU...</span>
    </button>
  </div>

  <div class="engine-grid" style="grid-template-columns: 1fr;">
    <div class="logic-card shadow-card">
      <div class="card-header-logic">
        <i class="bi bi-spellcheck primary-text me-2"></i>
        <span class="card-title-text">BẢNG ÁNH XẠ CHUẨN HÓA (NORMALIZATION)</span>
      </div>
      
      <div class="card-body-logic custom-scroll">
        <table class="logic-table" style="width: 100%;">
          <thead>
            <tr>
              <th>Từ viết tắt / Biến thể</th>
              <th class="text-center" style="width: 50px;"></th>
              <th>Từ chuẩn hóa</th>
              <th class="text-center" style="width: 80px;">Hành động</th>
            </tr>
          </thead>
          <tbody>
            
            <tr class="add-new-row">
              <td colspan="4" class="text-center" style="padding-bottom: 15px;">
                <button class="btn-add-mapping" 
                        (click)="addNewMapping()" 
                        style="width: 100%; border: 1.5px dashed #36873A; background: #f0f7f0; color: #36873A; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;">
                  <i class="bi bi-plus-lg me-1"></i> Thêm từ ánh xạ mới
                </button>
              </td>
            </tr>

            <tr *ngFor="let mapping of mappingList | slice:0:displayLimit; let i = index">
              <td>
                <input type="text" 
                       class="table-input" 
                       [(ngModel)]="mapping.from" 
                       placeholder="Ví dụ: k, ko, hông">
              </td>
              <td class="text-center">
                <i class="bi bi-arrow-right primary-text"></i>
              </td>
              <td>
                <input type="text" 
                       class="table-input" 
                       [(ngModel)]="mapping.to" 
                       placeholder="Ví dụ: không">
              </td>
              <td class="text-center">
                <button class="btn-row-del" (click)="removeMapping(i)" title="Xóa dòng này">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>

            <tr class="action-row" *ngIf="mappingList.length > 5">
              <td colspan="4" class="text-center" style="padding-top: 15px;">
                
                <button *ngIf="displayLimit < mappingList.length" 
                        class="btn btn-outline-success btn-sm me-2" 
                        (click)="showMore()"
                        style="border-radius: 20px; padding: 5px 15px;">
                  <i class="bi bi-chevron-down"></i> Xem thêm (Còn {{ mappingList.length - displayLimit }} từ)
                </button>
                
                <button *ngIf="displayLimit >= mappingList.length" 
                        class="btn btn-outline-secondary btn-sm" 
                        (click)="showLess()"
                        style="border-radius: 20px; padding: 5px 15px;">
                  <i class="bi bi-chevron-up"></i> Thu gọn
                </button>
                
              </td>
            </tr>

          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
