<div class="knowledge-base-container fadeIn">
  <div class="kb-toolbar">
    <div class="chip-group">
      <label class="filter-label">BỘ LỌC DANH MỤC:</label>
      <div class="chip-container">
        <button class="chip" 
                [class.active]="selectedCat === 'All'" 
                (click)="selectedCat = 'All'">
          Tất cả
        </button>
        
        <button class="chip" *ngFor="let cat of categories" 
                [class.active]="selectedCat === cat" 
                (click)="selectedCat = cat">
          {{ cat }}
        </button>
      </div>
    </div>
  </div>

  <div class="kb-table-card shadow-card">
    <table class="kb-table">
      <thead>
        <tr>
          <th style="width: 45%">Bảng danh sách câu hỏi (FAQ List)</th>
          <th class="text-center" style="width: 20%">Danh mục</th>
          <th class="text-center" style="width: 15%">Biến thể</th>
          <th style="width: 20%" class="text-center">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredFaqs">
          <td class="q-main-text">
            <div class="q-wrap">
              <strong>{{ item.question }}</strong>
              <p class="q-preview-answer text-truncate mb-0" style="max-width: 400px; font-size: 0.85rem; color: #888;">
                {{ item.answer }}
              </p>
            </div>
          </td>
          <td class="text-center">
            <span class="category-tag">{{ item.category }}</span>
          </td>
          <td class="text-center">
            <span class="variation-count">
              {{ item.variations?.length || 0 }} biến thể
            </span>
          </td>
          <td class="text-center">
            <div class="row-actions">
              <button class="btn-edit-inline" (click)="onEdit(item)">
                <i class="bi bi-pencil-square"></i> Sửa
              </button>
              
              <span class="divider">/</span>
              
              <button class="btn-delete-inline" (click)="onDelete(item._id)">
                <i class="bi bi-trash"></i> Xóa
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="filteredFaqs.length === 0">
          <td colspan="4" class="text-center py-5">
            <div class="empty-state">
              <i class="bi bi-chat-left-dots fs-1 text-light mb-3 d-block"></i>
              <p class="text-secondary mb-0">Chưa có câu hỏi nào trong mục này bà ơi!</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
