<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="box">
    <h2 class="title">KHÔI PHỤC MẬT MÃ</h2>

    <form *ngIf="step === 1" (ngSubmit)="sendOTP()" autocomplete="off">
      <p class="desc">Vui lòng nhập Email quản trị để nhận mã xác thực (OTP).</p>
      
      <div class="field">
        <div class="label">Email hệ thống <span class="req">*</span></div>
        <div class="control">
          <input
            type="email"
            class="inp"
            placeholder="Ví dụ: abc123@gmail.com"
            name="security_auth_email"
            [(ngModel)]="email"
            required
            autocomplete="off"
          />
        </div>
      </div>

      <button type="submit" class="submit" [disabled]="isLoading">
        {{ isLoading ? 'ĐANG GỬI MÃ...' : 'GỬI MÃ XÁC THỰC' }}
      </button>

      <div class="bottom">
        <a routerLink="/login" class="link">Quay lại Đăng nhập</a>
      </div>
    </form>

    <form *ngIf="step === 2" (ngSubmit)="resetPassword()" autocomplete="off">
      <p class="desc">Mã OTP đã được gửi đến: <b>{{ email }}</b></p>

      <div class="label text-center">Mã xác thực (OTP)</div>
      
      <div class="otp-wrapper" (paste)="onPaste($event)">
        <input 
          *ngFor="let digit of otpArray; let i = index" 
          type="tel" 
          class="otp-field" 
          maxlength="1" 
          inputmode="numeric"
          autocomplete="one-time-code"
          [(ngModel)]="otpArray[i]"
          [name]="'otp_box_' + i"
          (input)="onOtpInput($event, i)"
          (keydown)="onKeyDown($event, i)"
          #otpInput
        />
      </div>

      <div class="timer-box" [class.danger]="countdown === 0">
        <i class="bi bi-clock-history"></i>
        <span>{{ countdown > 0 ? 'Mã hết hạn sau: ' + countdown + 's' : 'Mã đã hết hạn!' }}</span>
      </div>

      <div class="field">
        <div class="label">Mật khẩu mới <span class="req">*</span></div>
        <div class="control">
          <input
            type="password"
            class="inp"
            placeholder="Tối thiểu 6 ký tự"
            name="new_pw_secure_field"
            [(ngModel)]="newPassword"
            minlength="6"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <button type="submit" class="submit" [disabled]="isLoading || countdown === 0">
        {{ isLoading ? 'ĐANG CẬP NHẬT...' : 'XÁC NHẬN ĐỔI MẬT KHẨU' }}
      </button>

      <div class="bottom">
        <button type="button" class="btn-link" (click)="resendOTP()" [disabled]="countdown > 0">
          Gửi lại mã mới
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" *ngIf="modal.show">
  <div class="modal-content" [class]="modal.type">
    <div class="modal-header">
      <div class="modal-icon-circle">
        <i *ngIf="modal.type === 'success'" class="bi bi-check-lg"></i>
        <i *ngIf="modal.type === 'error'" class="bi bi-exclamation-lg"></i>
      </div>
      <h3 class="modal-title">{{ modal.title }}</h3>
    </div>
    <div class="modal-body">
      {{ modal.message }}
    </div>
    <div class="modal-footer">
      <button class="modal-close-btn" (click)="closeModal()">ĐÃ HIỂU</button>
    </div>
  </div>
</div>
